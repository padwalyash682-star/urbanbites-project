<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Contact Us - URBAN BITES</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        rel="stylesheet">

    <!-- Google Font -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        *{
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#f5f5f5;
            overflow-x:hidden;
        }
        .navbar{
            background:linear-gradient(to right,#ff512f,#dd2476);
            padding:15px;
        }

        .navbar-brand{
            color:white !important;
            font-size:32px;
            font-weight:bold;
        }

        .nav-link{
            color:white !important;
            margin-left:15px;
            transition:0.3s;
        }

        .nav-link:hover{
            color:yellow !important;
        }
        .hero{
            height:60vh;

            background:
                linear-gradient(rgba(0,0,0,0.6),
                rgba(0,0,0,0.6)),
                url('food1234.png');

            background-size:cover;
            background-position:center;

            display:flex;
            justify-content:center;
            align-items:center;

            text-align:center;

            color:white;
        }

        .hero h1{
            font-size:60px;
            font-weight:bold;
        }

        .hero p{
            font-size:22px;
            margin-top:15px;
        }

        /* SECTION TITLE */

        .section-title{
            text-align:center;

            margin:60px 0 30px;

            color:#ff512f;

            font-size:42px;

            font-weight:bold;
        }


        .contact-box{
            background:white;

            padding:40px;

            border-radius:20px;

            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        .form-control{
            height:50px;

            border-radius:12px;
        }

        textarea.form-control{
            height:140px;
            resize:none;
        }

        .form-control:focus{
            box-shadow:none;

            border:2px solid #ff512f;
        }


        .btn-send{
            background:linear-gradient(to right,#ff512f,#dd2476);

            border:none;

            color:white;

            width:100%;

            height:50px;

            border-radius:12px;

            font-size:18px;

            font-weight:600;

            transition:0.3s;
        }

        .btn-send:hover{
            transform:scale(1.03);
        }

        .info-box{
            background:white;

            padding:30px;

            border-radius:20px;

            text-align:center;

            transition:0.4s;

            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        .info-box:hover{
            transform:translateY(-10px);
        }

        .info-box i{
            font-size:45px;

            color:#ff512f;

            margin-bottom:15px;
        }

        footer{
            background:linear-gradient(to right,#000,#434343);

            margin-top:60px;
        }

        footer h4{
            color:#ffcc00;
        }

        .social-icons a{
            font-size:24px;

            transition:0.3s;
        }

        .social-icons a:hover{
            color:#ff512f !important;
        }

        @media(max-width:768px){

            .hero h1{
                font-size:36px;
            }

            .hero p{
                font-size:16px;
            }

            .section-title{
                font-size:30px;
            }
        }
    </style>
</head>

<body>

    <section class="container">

        <h1 class="section-title">
            Get In Touch
        </h1>

        <div class="row g-4">

            <div class="col-md-4">

                <div class="info-box">

                    <i class="bi bi-telephone-fill"></i>

                    <h4>Call Us</h4>

                    <p>
                        +91 XXXXXXXX23
                    </p>

                </div>

            </div>

            <div class="col-md-4">

                <div class="info-box">

                    <i class="bi bi-envelope-fill"></i>

                    <h4>Email</h4>

                    <p>
                        support@urbanbites.com
                    </p>

                </div>

            </div>

            <div class="col-md-4">

                <div class="info-box">

                    <i class="bi bi-geo-alt-fill"></i>

                    <h4>Location</h4>

                    <p>
                        Maharashtra, India
                    </p>

                </div>

            </div>

        </div>

    </section>

   

                
    <footer class="text-light text-center py-4">

        <div class="container">

            <h4>🍔 URBAN BITES</h4>

            <p>
                Delicious Food Delivered Fast
            </p>

            <div class="social-icons">

                <a href="#"
                    class="text-white me-3">

                    <i class="bi bi-facebook"></i>

                </a>

                <a href="#"
                    class="text-white me-3">

                    <i class="bi bi-instagram"></i>

                </a>

                <a href="#"
                    class="text-white me-3">

                    <i class="bi bi-twitter"></i>

                </a>

                <a href="#"
                    class="text-white">

                    <i class="bi bi-linkedin"></i>

                </a>

            </div>

            <p class="mt-3">
                © 2026 URBAN BITES. All Rights Reserved.
            </p>

        </div>

    </footer>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
