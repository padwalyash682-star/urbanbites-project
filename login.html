<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - URBAN BITES</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            height:100vh;
            background:
                linear-gradient(rgba(0,0,0,0.6),
                rgba(0,0,0,0.6)),
                url('login1.PNG');

            background-size:cover;
            background-position:center;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        /* LOGIN BOX */

        .login-box{
            width:400px;
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(12px);
            padding:40px;
            border-radius:25px;
            box-shadow:0 8px 20px rgba(0,0,0,0.3);
            color:white;
        }

        .login-box h1{
            text-align:center;
            margin-bottom:30px;
            font-weight:bold;
        }

        .form-control{
            height:50px;
            border-radius:12px;
            border:none;
        }

        .form-control:focus{
            box-shadow:none;
            border:2px solid #ff512f;
        }

        .input-group-text{
            border:none;
            background:white;
            border-radius:12px 0 0 12px;
        }

        /* BUTTON */

        .btn-login{
            width:100%;
            background:linear-gradient(to right,#ff512f,#dd2476);
            border:none;
            height:50px;
            border-radius:12px;
            font-size:18px;
            font-weight:600;
            color:white;
            transition:0.3s;
        }

        .btn-login:hover{
            transform:scale(1.03);
        }

        /* LINKS */

        .extra-links{
            text-align:center;
            margin-top:20px;
        }

        .extra-links a{
            color:#fff;
            text-decoration:none;
            transition:0.3s;
        }

        .extra-links a:hover{
            color:yellow;
        }

        /* BRAND */

        .brand{
            text-align:center;
            font-size:35px;
            font-weight:bold;
            margin-bottom:10px;
            color:#ffcc00;
        }

        /* RESPONSIVE */

        @media(max-width:500px){

            .login-box{
                width:90%;
                padding:30px;
            }

            .brand{
                font-size:28px;
            }
        }
    </style>
</head>

<body>

    <!-- LOGIN BOX -->

    <div class="login-box">

        <div class="brand">
            🍔 URBAN BITES
        </div>

        <!-- LOGIN FORM -->

        <form>

            <!-- EMAIL -->

            <div class="mb-3">

                <label class="mb-2">
                    Email Address
                </label>

                <div class="input-group">

                    <span class="input-group-text">
                        <i class="bi bi-envelope-fill"></i>
                    </span>

                    <input type="email"
                        class="form-control"
                        placeholder="Enter your email"
                        required>

                </div>

            </div>

            <!-- PASSWORD -->

            <div class="mb-3">

                <label class="mb-2">
                    Password
                </label>

                <div class="input-group">

                    <span class="input-group-text">
                        <i class="bi bi-lock-fill"></i>
                    </span>

                    <input type="password"
                        class="form-control"
                        placeholder="Enter your password"
                        required>

                </div>

            </div>

    

            <!-- BUTTON -->

            <button type="submit"
                class="btn btn-login">

                Login

            </button>

        </form>

        <!-- EXTRA LINKS -->

        <div class="extra-links">


            <a href="register.html">
               Register
            </a>

            <br><br>

            <a href="index.html">
                ← Back To Home
            </a>

        </div>

    </div>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
