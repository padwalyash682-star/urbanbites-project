<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Create Account - URBAN BITES</title>

    <!-- Bootstrap CSS -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        rel="stylesheet">

    <!-- Google Font -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;

            background:
                linear-gradient(rgba(0,0,0,0.6),
                rgba(0,0,0,0.6)),
                url('login1.PNG');

            background-size:cover;
            background-position:center;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:30px;
        }

        /* REGISTER BOX */

        .register-box{
            width:500px;

            background:rgba(255,255,255,0.15);

            backdrop-filter:blur(12px);

            padding:40px;

            border-radius:25px;

            box-shadow:0 8px 20px rgba(0,0,0,0.3);

            color:white;
        }

        /* BRAND */

        .brand{
            text-align:center;

            font-size:35px;

            font-weight:bold;

            color:#ffcc00;

            margin-bottom:10px;
        }

        h1{
            text-align:center;

            margin-bottom:30px;

            font-weight:bold;
        }

        /* INPUTS */

        .form-control{
            height:50px;

            border:none;

            border-radius:12px;
        }

        .form-control:focus{
            box-shadow:none;

            border:2px solid #ff512f;
        }

        .input-group-text{
            border:none;

            background:white;

            border-radius:12px 0 0 12px;
        }

        /* BUTTON */

        .btn-register{
            width:100%;

            height:50px;

            border:none;

            border-radius:12px;

            font-size:18px;

            font-weight:600;

            background:linear-gradient(to right,#ff512f,#dd2476);

            color:white;

            transition:0.3s;
        }

        .btn-register:hover{
            transform:scale(1.03);
        }

        /* LINKS */

        .extra-links{
            text-align:center;

            margin-top:25px;
        }

        .extra-links a{
            color:white;

            text-decoration:none;

            transition:0.3s;
        }

        .extra-links a:hover{
            color:yellow;
        }

        /* RESPONSIVE */

        @media(max-width:600px){

            .register-box{
                width:100%;
                padding:30px;
            }

            .brand{
                font-size:28px;
            }
        }
    </style>
</head>

<body>

    <!-- REGISTER BOX -->

    <div class="register-box">

        <div class="brand">
            🍔 URBAN BITES
        </div>

      
        <!-- FORM -->

        <form>

            <!-- FULL NAME -->

            <div class="mb-3">

                <label class="mb-2">
                    Full Name
                </label>

                <div class="input-group">

                    <span class="input-group-text">
                        <i class="bi bi-person-fill"></i>
                    </span>

                    <input type="text"
                        class="form-control"
                        placeholder="Enter your full name"
                        required>

                </div>

            </div>

            <!-- EMAIL -->

            <div class="mb-3">

                <label class="mb-2">
                    Email Address
                </label>

                <div class="input-group">

                    <span class="input-group-text">
                        <i class="bi bi-envelope-fill"></i>
                    </span>

                    <input type="email"
                        class="form-control"
                        placeholder="Enter your email"
                        required>

                </div>

            </div>

            <!-- PHONE -->

            <div class="mb-3">

                <label class="mb-2">
                    Mobile Number
                </label>

                <div class="input-group">

                    <span class="input-group-text">
                        <i class="bi bi-telephone-fill"></i>
                    </span>

                    <input type="tel"
                        class="form-control"
                        placeholder="Enter mobile number"
                        required>

                </div>

            </div>

            <!-- PASSWORD -->

            <div class="mb-3">

                <label class="mb-2">
                    Password
                </label>

                <div class="input-group">

                    <span class="input-group-text">
                        <i class="bi bi-lock-fill"></i>
                    </span>

                    <input type="password"
                        class="form-control"
                        placeholder="Create password"
                        required>

                </div>

            </div>

            <!-- CONFIRM PASSWORD -->

            <div class="mb-4">

                <label class="mb-2">
                    Confirm Password
                </label>

                <div class="input-group">

                    <span class="input-group-text">
                        <i class="bi bi-shield-lock-fill"></i>
                    </span>

                    <input type="password"
                        class="form-control"
                        placeholder="Confirm password"
                        required>

                </div>

            </div>

            <!-- TERMS -->

          

            <!-- BUTTON -->

            <button type="submit"
                class="btn btn-register">

                Create Account

            </button>

        </form>

        <!-- LINKS -->

        <div class="extra-links">

           >

            <a href="login.html">
                Login Here
            </a>

            <br><br>

            <a href="index.html">
                ← Back To Home
            </a>

        </div>

    </div>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
